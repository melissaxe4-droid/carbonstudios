<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carbon Studios</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0a0a0f;
      color: white;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    header {
      width: 100%;
      padding: 30px 0;
      text-align: center;
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: #ffffff;
    }

    .tagline {
      font-size: 1.2rem;
      opacity: 0.7;
      margin-top: -10px;
      margin-bottom: 40px;
    }

    .card {
      background: #11111a;
      padding: 40px;
      border-radius: 12px;
      width: 90%;
      max-width: 600px;
      text-align: center;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.4);
    }

    .btn {
      display: inline-block;
      margin-top: 25px;
      padding: 14px 28px;
      background: #4f46e5;
      color: white;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      transition: 0.2s;
    }

    .btn:hover {
      background: #6d63ff;
    }

    footer {
      margin-top: auto;
      padding: 20px;
      opacity: 0.5;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>
  <header>Carbon Studios</header>
  <div class="tagline">Innovating digital experiences</div>

  <div class="card">
    <h2>Website Coming Soon</h2>
    <p>We're building something powerful. Stay tuned for updates.</p>
    <a href="#" class="btn">Join the Waitlist</a>
  </div>

  <footer>© 2026 Carbon Studios. All rights reserved.</footer>
</body>
</html>
